services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - adminer
    expose:
      - "80"

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-demo_db}
      MYSQL_USER: ${MYSQL_USER:-basedoprumo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123098}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass_123}
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer:4
    restart: unless-stopped
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_SERVER: db
    expose:
      - "8080"

volumes:
  mysql_data:
