services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - php
      - phpmyadmin
    expose:
      - "80"

  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-demo_db}
      DB_USERNAME: ${MYSQL_USER:-basedoprumo}
      DB_PASSWORD: ${MYSQL_PASSWORD:-123098}
    expose:
      - "9000"

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-demo_db}
      MYSQL_USER: ${MYSQL_USER:-basedoprumo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123098}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass_123}
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    expose:
      - "80"

volumes:
  mysql_data:
