<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frontend | Base do Prumo</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
    }

    .card {
      width: min(90vw, 680px);
      padding: 28px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.95);
      color: #0f172a;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    p {
      margin: 8px 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Area Frontend separada com sucesso</h1>
    <p>Esta pagina esta em <code>frontend/public</code>.</p>
    <p>Acesse o login em <code>/</code> e o banco em <code>/db/</code>.</p>
  </main>
</body>
</html>
