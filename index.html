<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste Deploy Coolify</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
    }

    .card {
      width: min(90vw, 640px);
      padding: 28px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.95);
      color: #0f172a;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    p {
      margin: 8px 0;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #22c55e;
      color: #052e16;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .button {
      margin-top: 18px;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: #2563eb;
      color: #ffffff;
    }

    .footer {
      margin-top: 18px;
      font-size: 0.85rem;
      color: #334155;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Deploy funcionando na Coolify 🚀</h1>
    <p>Se você está vendo esta página, o front subiu corretamente no servidor.</p>
    <p id="build-time"></p>
    <span class="badge">STATUS: ONLINE</span>
    <div>
      <button class="button" id="refresh-button">Atualizar hora</button>
    </div>
    <p class="footer">Projeto: demo-repository</p>
  </main>

  <script>
    const buildTimeElement = document.getElementById("build-time");
    const refreshButton = document.getElementById("refresh-button");

    function updateTime() {
      const now = new Date();
      buildTimeElement.textContent = `Hora do servidor/navegador: ${now.toLocaleString("pt-BR")}`;
    }

    refreshButton.addEventListener("click", updateTime);
    updateTime();
  </script>
</body>
</html>
